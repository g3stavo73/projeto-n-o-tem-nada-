<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Um pedido especial — Sarah, quer namorar comigo?">
  <title>Pedido especial — Sarah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card" aria-labelledby="titulo">
      <h1 id="titulo" class="titulo">Sarah, quer namorar comigo?</h1>
      <p class="lead">Escolha uma opção abaixo:</p>

      <div class="botoes" role="group" aria-label="Resposta">
        <button id="sim" type="button" class="btn btn-sim" aria-pressed="false">Sim</button>
        <button id="nao" type="button" class="btn btn-nao" aria-pressed="false">Não</button>
      </div>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
